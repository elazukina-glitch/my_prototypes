<script>
  // Tailwind CDN emits a "should not be used in production" notice meant for
  // real deployments. This is a single-file prototype, so we filter only that
  // exact message — other warnings still surface normally.
  (function () {
    const _warn = console.warn;
    console.warn = function (...args) {
      const msg = args[0];
      if (typeof msg === 'string' && msg.includes('cdn.tailwindcss.com should not be used in production')) return;
      _warn.apply(console, args);
    };
  })();
</script>

/* Sort jobs by their time string */
function timeKey(t) {
  const m = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return 0;
  let h = parseInt(m[1], 10);
  const mm = parseInt(m[2], 10);
  const ap = m[3].toUpperCase();
  if (ap === 'PM' && h !== 12) h += 12;
  if (ap === 'AM' && h === 12) h = 0;
  return h * 60 + mm;
}

/* Date helpers */
function dateToISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayISO() { return dateToISO(new Date()); }
function tomorrowISO() {
  const d = new Date(); d.setDate(d.getDate()+1); return dateToISO(d);
}
function friendlyDate(iso) {
  if (!iso) return 'Unscheduled';
  if (iso === todayISO()) return 'Today';
  if (iso === tomorrowISO()) return 'Tomorrow';
  const [y,m,day] = iso.split('-').map(Number);
  const d = new Date(y, m-1, day);
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return `${dayNames[d.getDay()]}, ${monthNames[d.getMonth()]} ${day}`;
}
function compareJobs(a, b) {
  const ad = a.dateISO || '\uffff'; // unscheduled go last
  const bd = b.dateISO || '\uffff';
  if (ad !== bd) return ad < bd ? -1 : 1;
  return timeKey(a.time) - timeKey(b.time);
}

/* The "now" indicator on the timeline is fixed in this prototype so that the
   demo state stays predictable. Auto-overdue derives from the same value. */
const NOW_LABEL = '8:45 AM';
const NOW_KEY = timeKey(NOW_LABEL);

function parseLocalISO(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function effectiveStatus(job) {
  if (job.status === 'done' || job.status === 'in_progress') return job.status;
  if (job.status === 'overdue') return 'overdue';
  if (!job.dateISO) return job.status; // unscheduled stays as-is
  const t = todayISO();
  if (job.dateISO < t) return 'overdue';
  if (job.dateISO === t && timeKey(job.time) < NOW_KEY) return 'overdue';
  return job.status;
}

    setJobs(prev => prev.map(j => j.id === jobId ? { ...j, ...patch } : j).sort(compareJobs));
  };
  const deleteJob = (jobId) => {
    setJobs(prev => prev.filter(j => j.id !== jobId));
  };
  const handleReschedule = (jobId, { time, dateISO }) => {
    updateJob(jobId, { time, dateISO });
    setModal(null);
    const message = !dateISO
      ? 'Marked as unscheduled'
      : dateISO === todayISO() ? 'Rescheduled to today' : `Rescheduled to ${friendlyDate(dateISO)}`;
    const target = !dateISO ? 'jobs' : (dateISO === todayISO() ? 'today' : 'jobs');
    pushToast(message, jobId, target);
  };
  const handleStatusChange = (jobId, status) => {
    updateJob(jobId, { status });
    setModal(null);
    const labels = { done:'Marked as done', in_progress:'Marked in progress', scheduled:'Reopened' };
    pushToast(labels[status] || 'Status updated', jobId);
  };
  const handleDeleteJob = (jobId) => {
    deleteJob(jobId);
    setModal(null);
    pushToast('Job deleted');
  };
  const openJobDetail = (job) => setModal({ kind:'detail', jobId: job.id });

  /* ── Toast ── */
  const pushToast = (message, jobId=null, viewTarget=null) => {
    setToast({ message, jobId, viewTarget, key: Date.now() });
  };
  // Auto-dismiss the latest toast
  useEffect(() => {
    if (!toast) return;
    const id = setTimeout(() => setToast(null), 4200);
    return () => clearTimeout(id);
  }, [toast?.key]);

  /* ── Demo controls ── */
  const loadDemoData = () => {
    const t = todayISO();
    setClients(DEMO_CLIENTS);
    setWorkers(DEMO_WORKERS_FULL);
    setJobs(DEMO_JOBS.map(j => ({...j, dateISO: t})).sort(compareJobs));
    setView('today');
    setModal(null);
    pushToast('Demo data loaded');
  };
  const loadStatusShowcase = () => {
    const t = todayISO();
    const tm = tomorrowISO();
    const built = DEMO_STATUS_JOBS.map((j, i) => {
      const dateISO = j._today ? t : (j._tomorrow ? tm : null);
      const { _today, _tomorrow, ...rest } = j;
      return { id: `s_${Date.now()}_${i}`, dateISO, ...rest };
    });
    setClients([]);
    setWorkers(DEMO_WORKERS_FULL);
    setJobs(built.sort(compareJobs));
    setView('today');
    setModal(null);
    pushToast('Statuses showcase loaded');
  };
  const resetAll = () => {
    setClients([]);
    setWorkers([]);
    setJobs([]);
    setView('today');
    setModal(null);
    pushToast('Workspace reset');
  };
  const seedClients = () => {
    setClients(DEMO_CLIENTS);
    pushToast('Sample clients added');
  };

  /* ── Render ── */
  return (
    <div className="h-full w-full p-4 md:p-6 flex items-stretch justify-center" style={{background:'var(--bg-page)'}}>
      <div className="w-full max-w-[1180px] h-full flex bg-white rounded-[14px] overflow-hidden" style={{boxShadow:'0 1px 0 rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.06)'}}>
        <Sidebar view={view} setView={setView} hasJobs={jobs.length>0} />
        <main className="flex-1 relative overflow-hidden">
          {view === 'today' && (
            <TodayView
              jobs={jobs.filter(j => j.dateISO === todayISO())}
              workers={workers}
              setJobs={setJobs}
              onSchedule={startScheduleJob}
              onAddEstimate={() => pushToast('Estimates — coming soon')}
              onOpenJob={openJobDetail}
              highlightJob={highlightJob}
              setHighlightJob={setHighlightJob}
              setView={setView}
              emptyVariant={emptyVariant}
            />
          )}
          {view === 'jobs' && (
            <JobsView
              jobs={jobs}
              workers={workers}
              setJobs={setJobs}
              onSchedule={startScheduleJob}
              onOpenJob={openJobDetail}
              highlightJob={highlightJob}
              setView={setView}
            />
          )}
          {view === 'crew' && (
            <CrewView
              workers={workers}
              setWorkers={setWorkers}
              setModal={setModal}
              pushToast={pushToast}
            />
          )}
          {view === 'clients' && (
            <ClientsView clients={clients} onAdd={() => setModal({ kind:'newClient' })} />
          )}
          {(view === 'invoices' || view === 'estimates' || view === 'priceBook') && (
            <PlaceholderView label={NAV_ITEMS.find(i=>i.id===view)?.label || ''} />
          )}
        </main>
      </div>

      {/* Modals */}
      {modal?.kind === 'pickClient' && (
        <PickClientModal
          clients={clients}
          onClose={() => setModal(null)}
          onPick={handleClientPicked}
          onNew={() => setModal({ kind:'newClient', returnTo:'jobTitle' })}
        />
      )}
      {modal?.kind === 'newClient' && (
        <NewClientModal
          onClose={() => setModal(modal.returnTo === 'jobTitle' && clients.length>0 ? { kind:'pickClient' } : null)}
          onSave={handleClientCreated}
        />
      )}
      {modal?.kind === 'jobTitle' && (
        <JobTitleModal
          client={modal.client}
          onClose={() => setModal(null)}
          onBackToClient={() => setModal(clients.length>1 ? { kind:'pickClient' } : null)}
          onContinue={handleJobTitleContinue}
        />
      )}
      {modal?.kind === 'when' && (
        <WhenModal
          client={modal.client}
          title={modal.title}
          mode={modal.editJobId ? 'edit' : 'create'}
          initialDateISO={modal.initialDateISO}
          initialTime={modal.initialTime}
          onClose={() => setModal(null)}
          onBackToTitle={modal.editJobId ? null : () => setModal({ kind:'jobTitle', client: modal.client })}
          onCreate={(payload) => {
            if (modal.editJobId) {
              handleReschedule(modal.editJobId, payload);
            } else {
              handleCreateJob(payload);
            }
          }}
          onScheduleLater={() => {
            if (modal.editJobId) {
              handleReschedule(modal.editJobId, { time:'Unscheduled', dateISO: null });
            } else {
              handleCreateJob({ time:'Unscheduled', dateLabel:'Later', dateISO: null });
            }
          }}
        />
      )}
      {modal?.kind === 'detail' && (() => {
        const job = jobs.find(j => j.id === modal.jobId);
        if (!job) return null;
        return (
          <JobDetailModal
            job={job}
            workers={workers}
            allJobs={jobs}
            onClose={() => setModal(null)}
            onChangeStatus={(status) => handleStatusChange(job.id, status)}
            onReschedule={() => setModal({
              kind:'when',
              editJobId: job.id,
              client: { name: job.client },
              title: job.title,
              initialDateISO: job.dateISO,
              initialTime: job.time === 'Unscheduled' ? null : job.time,
            })}
            onAssign={(workerId, workerName) => updateJob(job.id, { assigneeId: workerId, assigneeName: workerName })}
            onUnassign={() => updateJob(job.id, { assigneeId: null, assigneeName: undefined })}
            setView={setView}
          />
        );
      })()}
      {modal?.kind === 'inviteCrew' && (
        <InviteCrewModal
          onClose={() => setModal(null)}
          onSave={(names) => {
            const fresh = names.map((n, i) => ({ id:`w_${Date.now()}_${i}`, name:n }));
            setWorkers(prev => [...prev, ...fresh]);
            setModal(null);
            pushToast(`${fresh.length} ${fresh.length===1?'worker':'workers'} added`);
          }}
        />
      )}

      {/* Toast */}
      {toast && (
        <Toast toast={toast} onDismiss={() => setToast(null)} onView={() => {
          if (toast.viewTarget && toast.viewTarget !== view) {
            setView(toast.viewTarget);
          }
          if (toast.jobId) {
            setHighlightJob(toast.jobId);
            setTimeout(() => setHighlightJob(null), 1800);
          }
          setToast(null);
        }} />
      )}

      {/* Demo controls (small floating panel) */}
      <DemoPanel
        onLoad={loadDemoData}
        onLoadStatuses={loadStatusShowcase}
        onReset={resetAll}
        onSeedClients={seedClients}
        emptyVariant={emptyVariant}
        setEmptyVariant={setEmptyVariant}
      />
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────────
   SIDEBAR
   ────────────────────────────────────────────────────────────────── */

  return (
    <aside className="w-[230px] shrink-0 flex flex-col py-5 px-4 border-r border-line">

          <div className="w-8 h-8 rounded-[7px] bg-black flex items-center justify-center text-white font-semibold text-sm">B</div>
        </button>
        <button className="flex items-center justify-between text-[14px] font-medium text-ink rounded-md hover:bg-cream-soft px-1 py-1 -mx-1 transition">
          <span>Brick Builder</span>
          <Ic.chevronDown width="14" height="14" className="text-muted" />
        </button>
      </div>
      <nav className="flex flex-col gap-0.5">
        {NAV_ITEMS.map(item => {
          const active = view === item.id;
          const I = Ic[item.icon];
          return (
            <button
              key={item.id}
              onClick={() => setView(item.id)}
              className={`flex items-center gap-2.5 px-3 py-2 rounded-[8px] text-[13.5px] font-medium transition-colors ${
                active ? 'bg-cream text-ink' : 'text-ink hover:bg-cream-soft'
              }`}
            >
              <I width="17" height="17" className="shrink-0" />
              <span>{item.label}</span>
            </button>
          );
        })}
      </nav>
      <div className="mt-auto flex flex-col gap-0.5">
        <button className="flex items-center gap-2.5 px-3 py-2 rounded-[8px] text-[13.5px] font-medium text-ink hover:bg-cream-soft transition-colors">
          <Ic.settings width="17" height="17" className="shrink-0" />
          <span>Settings</span>
        </button>
        <button className="flex items-center gap-2.5 px-3 py-2 rounded-[8px] text-[13.5px] font-medium text-ink hover:bg-cream-soft transition-colors">
          <Ic.support width="17" height="17" className="shrink-0" />
          <span>Support</span>
        </button>
      </div>
    </aside>

}

/* ──────────────────────────────────────────────────────────────────
   TODAY VIEW
   ────────────────────────────────────────────────────────────────── */
function TodayView({ jobs, workers, setJobs, onSchedule, onAddEstimate, onOpenJob, highlightJob, setHighlightJob, setView, emptyVariant }) {
  const total = jobs.length;
  const done = jobs.filter(j => j.status === 'done').length;
  const subtitle = total === 0 ? "You're all caught up" : `${done} of ${total} ${total===1?'visit':'visits'} done`;

  return (
    <div className="h-full overflow-auto">
      <div className="px-10 pt-10 pb-2 flex items-start justify-between gap-6">
        <div>
          <h1 className="text-[28px] font-semibold tracking-[-0.02em] leading-tight">Today</h1>
          <p className="mt-1 text-[13.5px] text-muted">{subtitle}</p>
        </div>
        <div className="flex items-center gap-2.5">
          <button
            onClick={onSchedule}
            className="px-4 h-9 rounded-[8px] bg-black text-white text-[13.5px] font-medium hover:bg-ink-soft transition"
            style={{background:'var(--ink)'}}
          >
            Schedule job
          </button>
          <button
            onClick={onAddEstimate}
            className="px-4 h-9 rounded-[8px] bg-white text-ink text-[13.5px] font-medium border border-line-strong hover:bg-cream-soft transition"
          >
            Add estimate
          </button>
        </div>
      </div>

      <div className="px-10 mt-6 pb-10">
        {jobs.length === 0 ? (
          <EmptyToday variant={emptyVariant} />
        ) : (
          <JobList
            jobs={jobs}
            workers={workers}
            setJobs={setJobs}
            onOpenJob={onOpenJob}
            highlightJob={highlightJob}
            setView={setView}
          />
        )}
      </div>
    </div>
  );
}

function EmptyToday({ variant = 'original' }) {
  const text = variant === 'alternative'
    ? 'As you schedule visits, they line up here from morning to evening. Your whole day in one place'
    : 'Quiet day, no more jobs today';
  return (
    <div
      className="rounded-[12px] flex items-center justify-center text-muted-soft text-[14px] text-center px-6 leading-relaxed"
      style={{
        height:'min(60vh, 480px)',
        border:'1.5px dashed var(--line-strong)'
      }}
    >
      <span className="max-w-[420px]">{text}</span>
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────────
   JOBS VIEW — all scheduled jobs grouped by date
   ────────────────────────────────────────────────────────────────── */
function JobsView({ jobs, workers, setJobs, onSchedule, onOpenJob, highlightJob, setView }) {
  const groups = useMemo(() => {
    const map = new Map();
    for (const j of jobs) {
      const key = j.dateISO || '__unscheduled__';
      if (!map.has(key)) map.set(key, []);
      map.get(key).push(j);
    }
    for (const arr of map.values()) {
      arr.sort((a, b) => timeKey(a.time) - timeKey(b.time));
    }
    const entries = Array.from(map.entries()).sort(([a], [b]) => {
      if (a === '__unscheduled__') return 1;
      if (b === '__unscheduled__') return -1;
      return a < b ? -1 : 1;
    });
    return entries;
  }, [jobs]);

  return (
    <div className="h-full overflow-auto">
      <div className="px-10 pt-10 pb-2 flex items-start justify-between gap-6">
        <div>
          <h1 className="text-[28px] font-semibold tracking-[-0.02em] leading-tight">Jobs</h1>
          <p className="mt-1 text-[13.5px] text-muted">
            {jobs.length === 0
              ? 'No jobs scheduled yet'
              : `${jobs.length} ${jobs.length === 1 ? 'job' : 'jobs'} scheduled`}
          </p>
        </div>
        <div className="flex items-center gap-2.5">
          <button
            onClick={onSchedule}
            className="px-4 h-9 rounded-[8px] text-white text-[13.5px] font-medium hover:bg-ink-soft transition"
            style={{background:'var(--ink)'}}
          >
            Schedule job
          </button>
        </div>
      </div>

      <div className="px-10 mt-6 pb-10">
        {jobs.length === 0 ? (
          <div
            className="rounded-[12px] flex items-center justify-center text-muted-soft text-[14px]"
            style={{height:'320px', border:'1.5px dashed var(--line-strong)'}}
          >
            Schedule a job and it'll show up here
          </div>
        ) : (
          <div className="flex flex-col gap-7">
            {groups.map(([key, items]) => (
              <section key={key}>
                <div className="flex items-baseline gap-3 mb-1.5">
                  <h2 className="text-[14px] font-semibold text-ink tracking-[-0.005em]">
                    {key === '__unscheduled__' ? 'Unscheduled' : friendlyDate(key)}
                  </h2>
                  <span className="text-[12px] text-muted-soft tabular-nums">
                    {items.length} {items.length === 1 ? 'visit' : 'visits'}
                  </span>
                </div>
                <div>
                  {items.map(job => (
                    <JobRow
                      key={job.id}
                      job={job}
                      workers={workers}
                      allJobs={items}
                      setJobs={setJobs}
                      onOpen={onOpenJob}
                      highlight={highlightJob === job.id}
                      setView={setView}
                    />
                  ))}
                </div>
              </section>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────────
   JOB LIST + ROW
   ────────────────────────────────────────────────────────────────── */
function JobList({ jobs, workers, setJobs, onOpenJob, highlightJob, setView }) {
  const items = useMemo(() => {
    const sorted = [...jobs].sort((a,b)=>timeKey(a.time)-timeKey(b.time));
    return sorted;
  }, [jobs]);

  const nowIndex = items.findIndex(j => timeKey(j.time) > NOW_KEY);

  return (
    <div>
      {items.map((job, i) => (
        <React.Fragment key={job.id}>
          {i === nowIndex && <NowMarker label={NOW_LABEL} />}
          <JobRow
            job={job}
            workers={workers}
            allJobs={items}
            setJobs={setJobs}
            onOpen={onOpenJob}
            highlight={highlightJob === job.id}
            setView={setView}
          />
        </React.Fragment>
      ))}
      {nowIndex === -1 && items.length > 0 && <NowMarker label={NOW_LABEL} atEnd />}
    </div>
  );
}

function NowMarker({ label, atEnd }) {
  return (
    <div className="relative h-0 z-10" aria-hidden="false">
      <div
        className="absolute left-[14px] -translate-y-1/2 inline-flex items-center text-[11.5px] font-medium text-white px-2 py-1 rounded-full select-none"
        style={{ background:'#2A3F5F', top: atEnd ? 'auto' : 0, bottom: atEnd ? 0 : 'auto', boxShadow:'0 1px 2px rgba(0,0,0,0.10)' }}
      >
        {label}
      </div>
    </div>
  );
}

function JobRow({ job, workers, allJobs, setJobs, onOpen, highlight, setView }) {
  const [menuOpen, setMenuOpen] = useState(false);
  const [emptyHintOpen, setEmptyHintOpen] = useState(false);
  const wrapRef = useRef(null);

  // Close menus on outside click
  useEffect(() => {
    const onClick = (e) => {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) {
        setMenuOpen(false); setEmptyHintOpen(false);
      }
    };
    document.addEventListener('mousedown', onClick);
    return () => document.removeEventListener('mousedown', onClick);
  }, []);

  const onAssignClick = (e) => {
    e.stopPropagation();
    if (workers.length === 0) {
      setEmptyHintOpen(v => !v);
      setMenuOpen(false);
    } else {
      setMenuOpen(v => !v);
      setEmptyHintOpen(false);
    }
  };

  const setAssignee = (workerId, workerName) => {
    setJobs(prev => prev.map(j => j.id === job.id ? { ...j, assigneeId: workerId, assigneeName: workerName } : j));
    setMenuOpen(false);
  };
  const unassign = () => {
    setJobs(prev => prev.map(j => j.id === job.id ? { ...j, assigneeId:null, assigneeName:undefined } : j));
    setMenuOpen(false);
  };

  const status = effectiveStatus(job);
  const isDone = status === 'done';

  return (
    <div
      onClick={() => onOpen && onOpen(job)}
      className={`relative flex items-center gap-6 py-4 transition-colors cursor-pointer ${highlight ? 'bg-cream-soft' : 'hover:bg-cream-soft/60'} ${isDone ? 'opacity-60' : ''}`}
      style={{borderTop:'1px solid var(--line)'}}
    >
      <div className="w-[78px] shrink-0 text-[13.5px] text-muted tabular-nums">{job.time}</div>
      <div className="flex-1 min-w-0">
        <div className={`text-[14.5px] text-ink font-medium leading-tight ${isDone ? 'line-through decoration-1 decoration-[var(--muted-soft)]' : ''}`}>{job.title}</div>
        <div className="text-[13px] text-muted mt-0.5">{job.client}</div>
      </div>

      <div
        className="flex items-center gap-2 shrink-0"
        ref={wrapRef}
        onClick={(e) => e.stopPropagation()}
      >
        <StatusPill status={status} />

        {job.assigneeId
          ? (
            <button
              onClick={onAssignClick}
              className="inline-flex items-center gap-1.5 h-7 px-2.5 rounded-full text-[12.5px] text-ink bg-white border border-line-strong hover:bg-cream-soft transition relative"
            >
              <Ic.userBadge width="13" height="13" />
              <span>{job.assigneeName}</span>
            </button>
          )
          : (
            <button
              onClick={onAssignClick}
              className="inline-flex items-center gap-1 h-7 px-2.5 rounded-full text-[12.5px] text-muted bg-white border border-dashed border-line-strong hover:bg-cream-soft hover:text-ink transition"
            >
              <Ic.plus width="12" height="12" />
              <span>Assign</span>
            </button>
          )
        }

        {menuOpen && workers.length > 0 && (
          <AssigneeMenu
            allJobs={allJobs}
            currentJob={job}
            workers={workers}
            onPick={setAssignee}
            onUnassign={unassign}
          />
        )}
        {emptyHintOpen && workers.length === 0 && (
          <EmptyCrewHint
            onClose={() => setEmptyHintOpen(false)}
            onInvite={() => { setEmptyHintOpen(false); setView('crew'); }}
          />
        )}
      </div>
    </div>
  );
}

function StatusPill({ status }) {
  if (status === 'overdue')
    return <span className="text-[11.5px] font-medium px-2 py-0.5 rounded-full" style={{background:'var(--red-soft)', color:'var(--red-text)'}}>Overdue</span>;
  if (status === 'in_progress')
    return <span className="text-[11.5px] font-medium px-2 py-0.5 rounded-full" style={{background:'var(--blue-soft)', color:'var(--blue-text)'}}>In progress</span>;
  if (status === 'done')
    return <span className="text-[11.5px] font-medium px-2 py-0.5 rounded-full" style={{background:'var(--green-soft)', color:'var(--green-text)'}}>Done</span>;
  return null;
}

/* Assignee menu (matches screen 11/12) */
function AssigneeMenu({ allJobs, currentJob, workers, onPick, onUnassign }) {
  // Compute "Booked at" annotations for each worker by looking at other jobs.
  const booked = useMemo(() => {
    const map = {};
    for (const j of allJobs) {
      if (j.id === currentJob.id) continue;
      if (!j.assigneeId) continue;
      if (!map[j.assigneeId]) map[j.assigneeId] = j.time; // first occurrence
    }
    return map;
  }, [allJobs, currentJob.id]);

  const isAssigned = !!currentJob.assigneeId;

  return (
    <div
      className="absolute right-0 top-9 z-30 w-[300px] bg-white rounded-[10px] py-1.5 shadow-pop animate-fade-up"
    >
      <ul className="max-h-[260px] overflow-auto menu-scroll">
        {workers.map(w => {
          const bookedAt = booked[w.id];
          const isCurrent = w.id === currentJob.assigneeId;
          return (
            <li key={w.id}>
              <button
                onClick={() => onPick(w.id, w.name)}
                className={`w-full flex items-center justify-between gap-3 px-3.5 py-2 text-[13.5px] hover:bg-cream-soft transition ${isCurrent ? 'bg-cream-soft font-medium' : ''}`}
              >
                <span className="text-ink truncate">{w.name}</span>
                {bookedAt && <span className="text-muted-soft text-[12.5px] tabular-nums shrink-0">Booked at {bookedAt}</span>}
              </button>
            </li>
          );
        })}
      </ul>
      {isAssigned && (
        <>
          <div className="h-px my-1" style={{background:'var(--line)'}} />
          <div className="px-2 pb-1.5">
            <button
              onClick={onUnassign}
              className="w-full px-3 py-1.5 rounded-[7px] border border-line-strong text-[13px] text-ink hover:bg-cream-soft transition"
            >
              Unassign
            </button>
          </div>
        </>
      )}
    </div>
  );
}

/* Empty-crew hint shown next to a job's Assign button (matches screen 9 spirit) */
function EmptyCrewHint({ onClose, onInvite }) {
  return (
    <div
      className="absolute right-0 top-9 z-30 w-[280px] p-4 bg-white rounded-[12px] animate-fade-up"
      style={{
        boxShadow:'0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.10), 0 0 0 1px var(--line)',
        border:'1.5px dashed var(--line-strong)',
      }}
    >
      <div className="flex justify-center mb-3">
        <Ic.crew width="34" height="34" className="text-ink" />
      </div>
      <p className="text-center text-[13px] text-ink leading-snug mb-3">
        Assign workers to jobs and<br/>keep everyone in sync
      </p>

/* ──────────────────────────────────────────────────────────────────
   WHEN MODAL (screen 4)
   ────────────────────────────────────────────────────────────────── */
function WhenModal({ client, title, mode='create', initialDateISO, initialTime, onClose, onBackToTitle, onCreate, onScheduleLater }) {
  const isEdit = mode === 'edit';
  const today = new Date();
  const initial = initialDateISO ? parseLocalISO(initialDateISO) : today;
  const [weekStart, setWeekStart] = useState(initial);
  const [selectedDate, setSelectedDate] = useState(0);
  const [selectedTime, setSelectedTime] = useState(initialTime || '9:00 AM');

  const days = useMemo(() => {
    const arr = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(weekStart);
      d.setDate(d.getDate() + i);
      arr.push(d);
    }
    return arr;
  }, [weekStart]);

  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  const headerLabel = (() => {
    const sel = days[selectedDate];
    if (sel && sel.toDateString() === today.toDateString()) {
      return `Today, ${monthNames[sel.getMonth()]} ${sel.getDate()}`;
    }
    return `${monthNames[sel.getMonth()]} ${sel.getDate()}`;
  })();

  const shiftWeek = (delta) => {
    const d = new Date(weekStart); d.setDate(d.getDate() + delta*7); setWeekStart(d);
    setSelectedDate(0);
  };

  // Some times are visually disabled to mimic the screenshot.
  const isDisabled = (t) => {
    // Past-time mock — disable 8:00 AM (screen showed 8:00 AM faded).
    if (t === '8:00 AM') return true;
    return false;
  };

  const dateLabel = (() => {
    const sel = days[selectedDate];
    return `${dayNames[sel.getDay()]} ${sel.getDate()}`;
  })();
  const selectedDateISO = dateToISO(days[selectedDate]);

  return (
    <ModalShell onClose={onClose}>
      <div className="w-[560px] max-w-full flex flex-col gap-2.5 animate-scale-in">
        <SummaryCard label="Client" value={client.name} icon={<Ic.user width="15" height="15" />} />
        <SummaryCard
          label="Job"
          value={title}
          icon={<Ic.jobs width="15" height="15" />}
          onClick={isEdit ? null : onBackToTitle}
        />
        <Card>
          <header className="px-7 pt-6 pb-4">
            <h2 className="text-[20px] font-semibold tracking-[-0.01em]">{isEdit ? 'Reschedule' : 'When'}</h2>
          </header>
          <div className="px-7">
            {/* Week header with arrows */}
            <div className="flex items-center justify-between">
              <button onClick={() => shiftWeek(-1)} className="w-9 h-9 rounded-[8px] border border-line-strong flex items-center justify-center hover:bg-cream-soft transition">
                <Ic.arrowLeft width="15" height="15" />
              </button>
              <div className="text-[13.5px] text-ink font-medium">{headerLabel}</div>
              <button onClick={() => shiftWeek(1)} className="w-9 h-9 rounded-[8px] border border-line-strong flex items-center justify-center hover:bg-cream-soft transition">
                <Ic.arrowRight width="15" height="15" />
              </button>
            </div>

            {/* Day grid */}
            <div className="mt-3 grid grid-cols-7 gap-2">
              {days.map((d, i) => {
                const selected = i === selectedDate;
                return (
                  <button
                    key={i}
                    onClick={() => setSelectedDate(i)}
                    className={`flex flex-col items-center py-2 rounded-[10px] border text-center transition ${selected ? 'border-ink bg-white' : 'border-transparent hover:bg-cream-soft'}`}
                    style={selected ? {borderColor:'var(--ink)'} : {}}
                  >
                    <span className={`text-[11.5px] ${selected ? 'text-ink' : 'text-muted'}`}>{dayNames[d.getDay()]}</span>
                    <span className={`text-[15px] font-medium tabular-nums mt-0.5 ${selected ? 'text-ink' : 'text-muted'}`}>{d.getDate()}</span>
                  </button>
                );
              })}
            </div>

            {/* Time grid */}
            <div className="mt-5 grid grid-cols-4 gap-2">
              {TIME_SLOTS.map(t => {
                const selected = selectedTime === t;
                const disabled = isDisabled(t);
                if (selected) {
                  return (
                    <button
                      key={t}
                      onClick={() => !disabled && setSelectedTime(t)}
                      className="h-10 rounded-[8px] text-[13px] font-medium text-white tabular-nums"
                      style={{background:'var(--ink)'}}
                    >
                      {t}
                    </button>
                  );
                }
                if (disabled) {
                  return (
                    <button
                      key={t}
                      disabled
                      className="h-10 rounded-[8px] text-[13px] tabular-nums cursor-not-allowed"
                      style={{background:'var(--cream-soft)', color:'var(--muted-soft)'}}
                    >
                      {t}
                    </button>
                  );
                }
                return (
                  <button
                    key={t}
                    onClick={() => setSelectedTime(t)}
                    className="h-10 rounded-[8px] text-[13px] tabular-nums text-ink border border-line-strong bg-white hover:bg-cream-soft transition"
                  >
                    {t}
                  </button>
                );
              })}
              <button
                className="h-10 rounded-[8px] text-[13px] text-ink flex items-center justify-center gap-1.5 hover:bg-cream-soft transition"
                style={{border:'1.5px dashed var(--line-strong)'}}
                onClick={() => alert('Custom time picker — out of scope for prototype')}
              >
                <Ic.link width="13" height="13" />
                Other...
              </button>
            </div>
          </div>

          <footer className="px-7 pb-6 pt-6 flex items-center justify-between">
            <button
              onClick={onScheduleLater}
              className="h-9 px-4 rounded-[8px] border border-line-strong text-[13.5px] text-ink hover:bg-cream-soft transition"
            >
              Schedule later
            </button>
            <button
              onClick={() => onCreate({ time: selectedTime, dateLabel, dateISO: selectedDateISO })}
              className="h-9 px-5 rounded-[8px] text-white text-[13.5px] font-medium hover:bg-ink-soft transition"
              style={{background:'var(--ink)'}}
            >
              {isEdit ? 'Save' : 'Create job'}
            </button>
          </footer>
        </Card>
      </div>
    </ModalShell>
  );
}

            className="h-9 px-4 rounded-[8px] border border-line-strong text-[13px] text-ink hover:bg-cream-soft transition"

  return (

        {clients.length === 0 ? (
          <div className="rounded-[12px] flex items-center justify-center text-muted-soft text-[14px] h-[320px]" style={{border:'1.5px dashed var(--line-strong)'}}>
            No clients yet — they'll appear after you create your first job
          </div>
        ) : (
          <ul className="rounded-[12px] overflow-hidden" style={{border:'1px solid var(--line)'}}>
            {clients.map((c, i) => (
              <li key={c.id} className="flex items-center justify-between px-5 py-3.5" style={{borderTop: i===0 ? 'none':'1px solid var(--line)'}}>
                <span className="text-[14px] text-ink font-medium">{c.name}</span>
                <span className="text-[13px] text-muted-soft">{c.address}</span>
              </li>
            ))}
          </ul>
        )}
      </div>
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────────
   SHARED PRIMITIVES
   ────────────────────────────────────────────────────────────────── */
function ModalShell({ children, onClose }) {
  // Lock scroll while open
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onClose]);
  return (
    <div
      className="fixed inset-0 z-40 flex items-start justify-center pt-12 pb-12 px-6 overflow-auto animate-fade-in"
      style={{background:'rgba(255,255,255,0.78)', backdropFilter:'blur(2px)'}}
      onClick={onClose}
    >
      <button
        aria-label="Close"
        onClick={onClose}
        className="fixed top-7 left-7 w-9 h-9 rounded-full bg-white border border-line-strong flex items-center justify-center hover:bg-cream-soft transition"
      >
        <Ic.close width="14" height="14" />
      </button>
      <div className="relative" onClick={(e) => e.stopPropagation()}>{children}</div>
    </div>
  );
}

function Card({ children, className='' }) {
  return (
    <div className={`w-[560px] max-w-full bg-white rounded-[14px] shadow-modal animate-scale-in ${className}`}>
      {children}
    </div>
  );
}

function SummaryCard({ label, value, icon, onClick }) {
  return (
    <button
      onClick={onClick}
      disabled={!onClick}
      className={`w-full bg-white rounded-[12px] px-5 py-3.5 flex items-center justify-between text-left animate-scale-in ${onClick ? 'hover:bg-cream-soft cursor-pointer' : 'cursor-default'}`}
      style={{boxShadow:'0 0 0 1px var(--line)'}}
    >
      <span className="flex items-center gap-2 text-[13.5px] text-ink">
        <span className="text-muted">{icon}</span>
        <span className="font-medium">{label}</span>
      </span>
      <span className="text-[13.5px] text-ink">{value}</span>
    </button>
  );
}

function Field({ label, children }) {
  return (
    <label className="block">
      <span className="block text-[12.5px] font-medium text-ink mb-1.5">{label}</span>
      {children}
    </label>
  );
}

function Input({ value, onChange, placeholder, autoFocus }) {
  return (
    <input
      autoFocus={autoFocus}
      value={value}
      onChange={(e) => onChange(e.target.value)}
      placeholder={placeholder}
      className="w-full h-10 px-3 rounded-[8px] border border-line-strong text-[13.5px] placeholder-muted-soft bg-white"
    />
  );
}

function Textarea({ value, onChange, placeholder }) {
  return (
    <textarea
      value={value}
      onChange={(e) => onChange(e.target.value)}
      placeholder={placeholder}
      rows={3}
      className="w-full px-3 py-2.5 rounded-[8px] border border-line-strong text-[13.5px] placeholder-muted-soft bg-white resize-none"
    />
  );
}

/* ──────────────────────────────────────────────────────────────────
   TOAST  (matches screen 5)
   ────────────────────────────────────────────────────────────────── */
function Toast({ toast, onDismiss, onView }) {
  return (
    <div
      className="fixed left-1/2 bottom-7 z-50 flex items-center gap-3 pl-4 pr-1 py-1.5 rounded-full text-white text-[13.5px] animate-slide-up"
      style={{background:'var(--ink)', boxShadow:'0 8px 24px rgba(0,0,0,0.25)'}}
    >
      <span className="flex items-center gap-2">
        <span className="w-4 h-4 rounded-full flex items-center justify-center" style={{background:'rgba(255,255,255,0.18)'}}>
          <Ic.check width="11" height="11" />
        </span>
        {toast.message}
      </span>
      {toast.jobId && (
        <button
          onClick={onView}
          className="h-7 px-3 rounded-full bg-white text-ink text-[12.5px] font-medium hover:bg-cream transition"
        >
          View
        </button>
      )}
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────────
   DEMO PANEL  (helper for prototype navigation)
   ────────────────────────────────────────────────────────────────── */
function DemoPanel({ onLoad, onLoadStatuses, onReset, onSeedClients, emptyVariant, setEmptyVariant }) {
  const [open, setOpen] = useState(false);
  return (
    <div className="fixed bottom-5 right-5 z-50">
      {open && (
        <div className="mb-2 w-[280px] bg-white rounded-[12px] p-3 shadow-pop animate-fade-up">
          <div className="text-[12px] font-semibold text-ink mb-1">Prototype controls</div>
          <p className="text-[11.5px] text-muted leading-snug mb-3">Quickly switch between prototype states.</p>
          <div className="flex flex-col gap-1.5">
            <button
              onClick={onLoad}
              className="h-8 px-3 rounded-[7px] text-white text-[12.5px] font-medium hover:bg-ink-soft transition text-left"
              style={{background:'var(--ink)'}}
            >
              Load full demo data (screen 10)
            </button>
            <button
              onClick={onLoadStatuses}
              className="h-8 px-3 rounded-[7px] border border-line-strong text-[12.5px] text-ink hover:bg-cream-soft transition text-left"
            >
              Load statuses showcase
            </button>
            <button
              onClick={onSeedClients}
              className="h-8 px-3 rounded-[7px] border border-line-strong text-[12.5px] text-ink hover:bg-cream-soft transition text-left"
            >
              Seed sample clients only
            </button>
            <button
              onClick={onReset}
              className="h-8 px-3 rounded-[7px] border border-line-strong text-[12.5px] text-ink hover:bg-cream-soft transition text-left flex items-center gap-1.5"
            >
              <Ic.reset width="13" height="13" />
              Reset workspace
            </button>
          </div>

          <div className="mt-3 pt-3" style={{borderTop:'1px solid var(--line)'}}>
            <div className="text-[11px] uppercase tracking-wide text-muted-soft mb-1.5">Empty Today copy</div>
            <div className="flex p-0.5 rounded-[8px] bg-cream-soft" style={{boxShadow:'0 0 0 1px var(--line)'}}>
              {[
                { id:'original', label:'Original' },
                { id:'alternative', label:'Alternative' },
              ].map(opt => {
                const active = emptyVariant === opt.id;
                return (
                  <button
                    key={opt.id}
                    onClick={() => setEmptyVariant(opt.id)}
                    className={`flex-1 h-7 rounded-[6px] text-[12px] font-medium transition ${active ? 'bg-white text-ink' : 'text-muted hover:text-ink'}`}
                    style={active ? {boxShadow:'0 1px 2px rgba(0,0,0,0.06), 0 0 0 1px var(--line)'} : {}}
                  >
                    {opt.label}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      )}
      <button
        onClick={() => setOpen(v=>!v)}
        className="h-9 px-3.5 rounded-full bg-white text-ink text-[12.5px] font-medium hover:bg-cream-soft transition flex items-center gap-1.5"
        style={{boxShadow:'0 4px 14px rgba(0,0,0,0.10), 0 0 0 1px var(--line-strong)'}}
      >
        <span className="w-1.5 h-1.5 rounded-full" style={{background: open ? '#22C55E' : '#9CA3AF'}}></span>
        Demo controls
      </button>
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────────
   MOUNT
   ────────────────────────────────────────────────────────────────── */
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
